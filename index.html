<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pro Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0f1e;
            color: #e6eef8;
            line-height: 1.6;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            background: linear-gradient(135deg, #0f1629 0%, #1a1f36 100%);
            border-radius: 12px;
            padding: 20px 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(135deg, #06b6d4, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .mode-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .mode-label {
            color: #9fb6c9;
            font-size: 14px;
        }

        .mode-pill {
            padding: 2px 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 500;
        }

        .mode-pill.simulated {
            background: rgba(6, 182, 212, 0.2);
            color: #06b6d4;
        }

        .mode-pill.real {
            background: rgba(124, 58, 237, 0.2);
            color: #7c3aed;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .control-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 8px 16px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background: #06b6d4;
            color: #0a0f1e;
        }

        .btn-primary:hover {
            background: #0891b2;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(6, 182, 212, 0.3);
        }

        .btn-secondary {
            background: #7c3aed;
            color: white;
        }

        .btn-secondary:hover {
            background: #6d28d9;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(124, 58, 237, 0.3);
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            color: #9fb6c9;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-1px);
        }

        .crypto-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 24px;
        }

        @media (max-width: 768px) {
            .crypto-grid {
                grid-template-columns: 1fr;
            }
        }

        .crypto-card {
            background: linear-gradient(135deg, #0f1629 0%, #1a1f36 100%);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .crypto-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .crypto-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .crypto-header h3 {
            font-size: 18px;
            font-weight: 500;
            color: #9fb6c9;
        }

        .crypto-symbol {
            font-size: 14px;
            font-weight: 600;
            color: #6b7a8e;
            background: rgba(255, 255, 255, 0.05);
            padding: 2px 8px;
            border-radius: 4px;
        }

        .crypto-price {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .crypto-change {
            font-size: 14px;
            margin-bottom: 16px;
        }

        .crypto-change.positive {
            color: #10b981;
        }

        .crypto-change.negative {
            color: #ef4444;
        }

        .chart-container {
            height: 120px;
            width: 100%;
        }

        .currency-section {
            background: linear-gradient(135deg, #0f1629 0%, #1a1f36 100%);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            margin-bottom: 24px;
        }

        .currency-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
        }

        .currency-header h3 {
            font-size: 18px;
            font-weight: 500;
        }

        .currency-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .currency-controls input,
        .currency-controls select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #e6eef8;
            font-size: 14px;
        }

        .currency-controls input::placeholder {
            color: #6b7a8e;
        }

        .currency-controls select option {
            background: #1a1f36;
        }

        .table-container {
            max-height: 300px;
            overflow-y: auto;
        }

        .table-container::-webkit-scrollbar {
            width: 6px;
        }

        .table-container::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 3px;
        }

        .table-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            position: sticky;
            top: 0;
            background: #0f1629;
            z-index: 1;
        }

        th {
            text-align: left;
            padding: 10px 12px;
            font-weight: 500;
            color: #9fb6c9;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 10px 12px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            color: #e6eef8;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.02);
        }

        .delta-up {
            color: #10b981;
        }

        .delta-down {
            color: #ef4444;
        }

        .weather-section {
            margin-bottom: 24px;
        }

        .weather-card {
            background: linear-gradient(135deg, #0f1629 0%, #1a1f36 100%);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .weather-card h3 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 8px;
        }

        .weather-info {
            font-size: 16px;
            color: #9fb6c9;
        }

        .status {
            text-align: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .status-text {
            font-size: 13px;
            color: #6b7a8e;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .crypto-card,
        .currency-section,
        .weather-card {
            animation: fadeIn 0.5s ease-out;
        }

        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }

        .status-badge.live {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .status-badge.simulated {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #ef4444;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 12px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-content">
                <h1>📊 Pro Dashboard</h1>
                <div class="mode-indicator">
                    <span class="mode-label">Mode:</span>
                    <span id="modePill" class="mode-pill simulated">Simulated</span>
                    <span id="sourceBadge" class="status-badge simulated">SIM</span>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div id="errorMessage" class="error-message"></div>

            <div class="controls">
                <div class="control-group">
                    <button id="btnSim" class="btn btn-primary">Simulated</button>
                    <button id="btnReal" class="btn btn-secondary">Real</button>
                </div>
                <div class="control-group">
                    <button id="btnRefresh" class="btn btn-outline">🔄 Refresh</button>
                    <button id="btnPause" class="btn btn-outline">⏸️ Pause</button>
                    <button id="btnExport" class="btn btn-outline">📥 Export CSV</button>
                </div>
            </div>

            <div class="crypto-grid">
                <div class="crypto-card">
                    <div class="crypto-header">
                        <h3>Bitcoin</h3>
                        <span class="crypto-symbol">BTC</span>
                    </div>
                    <div class="crypto-price" id="btc">$—</div>
                    <div class="crypto-change" id="btcDelta">—</div>
                    <div class="chart-container">
                        <canvas id="chartBTC"></canvas>
                    </div>
                </div>

                <div class="crypto-card">
                    <div class="crypto-header">
                        <h3>Ethereum</h3>
                        <span class="crypto-symbol">ETH</span>
                    </div>
                    <div class="crypto-price" id="eth">$—</div>
                    <div class="crypto-change" id="ethDelta">—</div>
                    <div class="chart-container">
                        <canvas id="chartETH"></canvas>
                    </div>
                </div>
            </div>

            <div class="currency-section">
                <div class="currency-header">
                    <h3>Currency Rates</h3>
                    <div class="currency-controls">
                        <input id="filter" placeholder="🔍 Filter currency..." />
                        <select id="sort">
                            <option value="alpha">A → Z</option>
                            <option value="rate_desc">Rate ↓</option>
                            <option value="rate_asc">Rate ↑</option>
                        </select>
                    </div>
                </div>
                <div class="table-container">
                    <table id="rates">
                        <thead>
                            <tr>
                                <th>Currency</th>
                                <th>Rate</th>
                                <th>Δ</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <div class="weather-section">
                <div class="weather-card">
                    <h3>🌤️ Weather</h3>
                    <div id="weather" class="weather-info">Loading...</div>
                </div>
            </div>

            <div class="status">
                <span id="last" class="status-text">Updated: —</span>
            </div>
        </main>
    </div>

    <script>
        // ============================================================
        // COMPLETE DASHBOARD - Self-contained single file
        // All data is simulated locally with realistic random walk
        // ============================================================

        // ----- State -----
        let MODE = 'simulated'; // 'simulated' or 'real'
        let lastCrypto = { btc: 42000, eth: 3200 };
        let lastRates = {
            EUR: 0.92,
            GBP: 0.79,
            NGN: 770,
            JPY: 157.5,
            CNY: 7.2,
            AUD: 1.55,
            CAD: 1.35,
            CHF: 0.88,
            INR: 83.5,
            BRL: 5.1,
            ZAR: 18.2,
            KES: 148.5,
            EGP: 30.8,
            MXN: 17.2,
            RUB: 95.4
        };
        let lastWeather = { temp: 28, cond: 'Clear', humidity: 60 };
        let paused = false;
        let lastSnapshot = { crypto: null, rates: null, weather: null };
        let chartBTC, chartETH;

        // ----- Helper Functions -----
        function randn() {
            let u = 0,
                v = 0;
            while (u === 0) u = Math.random();
            while (v === 0) v = Math.random();
            return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
        }

        function simulateWalk(prev, vol = 1, drift = 0) {
            const shock = randn() * vol;
            const next = prev * (1 + drift / 100) + shock;
            return Math.max(0.0001, Number(next.toFixed(6)));
        }

        // ----- Data Generation (Simulated) -----
        function generateCrypto() {
            lastCrypto.btc = simulateWalk(lastCrypto.btc, 120, 0.02);
            lastCrypto.eth = simulateWalk(lastCrypto.eth, 6, 0.03);
            return {
                source: 'simulated',
                btc: Number(lastCrypto.btc.toFixed(2)),
                eth: Number(lastCrypto.eth.toFixed(2)),
                ts: Date.now()
            };
        }

        function generateRates() {
            Object.keys(lastRates).forEach(k => {
                const v = lastRates[k];
                const jitter = randn() * (v * 0.001);
                lastRates[k] = Number(Math.max(0.0001, v + jitter).toFixed(6));
            });
            return { source: 'simulated', rates: lastRates, ts: Date.now() };
        }

        function generateWeather() {
            lastWeather.temp = Number((lastWeather.temp + randn() * 0.2).toFixed(1));
            lastWeather.humidity = Math.max(10, Math.min(99, Math.round(lastWeather.humidity + randn() * 1)));
            lastWeather.cond = lastWeather.temp > 30 ? 'Hot' : lastWeather.temp > 20 ? 'Warm' : 'Cool';
            return { source: 'simulated', weather: lastWeather, ts: Date.now() };
        }

        // ----- API Simulation -----
        function api(path, opts = {}) {
            return new Promise((resolve, reject) => {
                // Simulate network delay
                setTimeout(() => {
                    try {
                        // Handle POST requests
                        if (opts.method === 'POST' && path === 'mode') {
                            const body = JSON.parse(opts.body || '{}');
                            if (body.mode === 'simulated' || body.mode === 'real') {
                                MODE = body.mode;
                                resolve({ ok: true, mode: MODE });
                            } else {
                                reject(new Error('Invalid mode'));
                            }
                            return;
                        }

                        // GET endpoints
                        if (path === 'crypto') {
                            resolve(generateCrypto());
                        } else if (path === 'currency') {
                            resolve(generateRates());
                        } else if (path === 'weather') {
                            resolve(generateWeather());
                        } else if (path === 'refresh') {
                            resolve({
                                ok: true,
                                ts: Date.now(),
                                crypto: lastCrypto,
                                rates: lastRates,
                                weather: lastWeather
                            });
                        } else if (path === 'export') {
                            // Generate CSV
                            const rows = [];
                            rows.push(['metric', 'value'].join(','));
                            rows.push(['btc', lastCrypto.btc]);
                            rows.push(['eth', lastCrypto.eth]);
                            rows.push('');
                            rows.push(['currency', 'rate'].join(','));
                            Object.keys(lastRates).forEach(k => rows.push([k, lastRates[k]].join(',')));
                            const csv = rows.join('\n');
                            const blob = new Blob([csv], { type: 'text/csv' });
                            resolve(blob);
                        } else {
                            reject(new Error('Unknown endpoint'));
                        }
                    } catch (e) {
                        reject(e);
                    }
                }, 100 + Math.random() * 200);
            });
        }

        // ----- DOM References -----
        const btnSim = document.getElementById('btnSim');
        const btnReal = document.getElementById('btnReal');
        const btnRefresh = document.getElementById('btnRefresh');
        const btnPause = document.getElementById('btnPause');
        const btnExport = document.getElementById('btnExport');
        const modePill = document.getElementById('modePill');
        const sourceBadge = document.getElementById('sourceBadge');
        const btcEl = document.getElementById('btc');
        const ethEl = document.getElementById('eth');
        const btcDelta = document.getElementById('btcDelta');
        const ethDelta = document.getElementById('ethDelta');
        const ratesTbody = document.querySelector('#rates tbody');
        const filterInput = document.getElementById('filter');
        const sortSelect = document.getElementById('sort');
        const weatherEl = document.getElementById('weather');
        const lastUpdate = document.getElementById('last');
        const errorMessage = document.getElementById('errorMessage');

        // ----- Charts -----
        function initCharts() {
            const ctxBTC = document.getElementById('chartBTC');
            const ctxETH = document.getElementById('chartETH');
            if (!ctxBTC || !ctxETH) return;

            const commonOptions = {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: {
                    x: { display: false, grid: { display: false } },
                    y: { display: false, grid: { display: false } }
                },
                elements: {
                    line: { tension: 0.4, borderWidth: 2 },
                    point: { radius: 0 }
                }
            };

            chartBTC = new Chart(ctxBTC, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'BTC',
                        data: [],
                        borderColor: '#06b6d4',
                        backgroundColor: 'rgba(6, 182, 212, 0.1)',
                        fill: true
                    }]
                },
                options: commonOptions
            });

            chartETH = new Chart(ctxETH, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'ETH',
                        data: [],
                        borderColor: '#7c3aed',
                        backgroundColor: 'rgba(124, 58, 237, 0.1)',
                        fill: true
                    }]
                },
                options: commonOptions
            });
        }

        // ----- Render Functions -----
        function renderRates(rates) {
            if (!rates) return;
            const filter = (filterInput.value || '').trim().toUpperCase();
            const sort = sortSelect.value;
            const entries = Object.entries(rates);

            let filtered = entries.filter(([k]) => k.includes(filter) || filter === '');
            if (sort === 'alpha') filtered.sort((a, b) => a[0].localeCompare(b[0]));
            else if (sort === 'rate_desc') filtered.sort((a, b) => b[1] - a[1]);
            else if (sort === 'rate_asc') filtered.sort((a, b) => a[1] - b[1]);

            const frag = document.createDocumentFragment();
            filtered.forEach(([k, v]) => {
                const tr = document.createElement('tr');
                const prev = lastSnapshot.rates && lastSnapshot.rates[k] ? lastSnapshot.rates[k] : null;
                const delta = prev ? (v - prev) : 0;
                const deltaClass = delta > 0 ? 'delta-up' : (delta < 0 ? 'delta-down' : '');
                const deltaText = prev ? (delta > 0 ? '+' : '') + delta.toFixed(4) : '—';
                tr.innerHTML =
                    `<td>${k}</td><td>${Number(v).toLocaleString(undefined, { minimumFractionDigits: 4, maximumFractionDigits: 4 })}</td><td class="${deltaClass}">${deltaText}</td>`;
                frag.appendChild(tr);
            });
            ratesTbody.innerHTML = '';
            ratesTbody.appendChild(frag);
        }

        function updateUI(data) {
            const { crypto, rates, weather, snapshot } = data;

            // Update crypto
            if (crypto) {
                const c = crypto;
                const prevBtc = parseFloat(btcEl.dataset.raw || 0);
                const prevEth = parseFloat(ethEl.dataset.raw || 0);

                btcEl.textContent = '$' + Number(c.btc).toLocaleString(undefined, {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });
                ethEl.textContent = '$' + Number(c.eth).toLocaleString(undefined, {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });

                btcEl.dataset.raw = c.btc;
                ethEl.dataset.raw = c.eth;

                const btcChange = prevBtc ? ((c.btc - prevBtc) >= 0 ? '+' : '') + (c.btc - prevBtc).toFixed(2) : '—';
                const ethChange = prevEth ? ((c.eth - prevEth) >= 0 ? '+' : '') + (c.eth - prevEth).toFixed(2) : '—';

                btcDelta.textContent = btcChange;
                btcDelta.className = 'crypto-change' + (prevBtc ? (c.btc >= prevBtc ? ' positive' : ' negative') : '');
                ethDelta.textContent = ethChange;
                ethDelta.className = 'crypto-change' + (prevEth ? (c.eth >= prevEth ? ' positive' : ' negative') : '');

                // Update charts
                const t = new Date().toLocaleTimeString();
                if (chartBTC && chartETH) {
                    chartBTC.data.labels.push(t);
                    chartBTC.data.datasets[0].data.push(c.btc);
                    chartETH.data.labels.push(t);
                    chartETH.data.datasets[0].data.push(c.eth);

                    if (chartBTC.data.labels.length > 60) {
                        chartBTC.data.labels.shift();
                        chartBTC.data.datasets[0].data.shift();
                    }
                    if (chartETH.data.labels.length > 60) {
                        chartETH.data.labels.shift();
                        chartETH.data.datasets[0].data.shift();
                    }
                    chartBTC.update('none');
                    chartETH.update('none');
                }
            }

            // Update rates
            if (rates) {
                lastSnapshot.rates = rates.rates || rates;
                renderRates(lastSnapshot.rates);
            }

            // Update weather
            if (weather) {
                const w = weather.weather || weather;
                if (w.temp !== undefined) {
                    weatherEl.textContent = `${w.cond || w.description || '—'}, ${w.temp}°C — Humidity ${w.humidity || '—'}%`;
                }
            }

            if (snapshot) {
                lastSnapshot = Object.assign({}, lastSnapshot, snapshot);
            }

            lastUpdate.textContent = `Updated: ${new Date().toLocaleTimeString()}`;
        }

        function showError(msg) {
            errorMessage.textContent = msg;
            errorMessage.className = 'error-message show';
            setTimeout(() => {
                errorMessage.className = 'error-message';
            }, 5000);
        }

        // ----- Main Refresh -----
        async function refreshAll() {
            if (paused) return;
            try {
                // Simulate all API calls in parallel
                const [crypto, currency, weather, snapshot] = await Promise.all([
                    api('crypto'),
                    api('currency'),
                    api('weather'),
                    api('refresh')
                ]);

                // Update source badge
                const source = crypto.source || 'simulated';
                sourceBadge.textContent = source.toUpperCase();
                sourceBadge.className = `status-badge ${source}`;

                updateUI({ crypto, rates: currency, weather, snapshot });
            } catch (error) {
                console.warn('Refresh failed:', error);
                showError('Failed to refresh data. Using simulated data.');
                // Fallback to simulated
                const fallback = {
                    crypto: generateCrypto(),
                    rates: generateRates(),
                    weather: generateWeather()
                };
                updateUI(fallback);
            }
        }

        // ----- Mode Switching -----
        async function setMode(mode) {
            try {
                await api('mode', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mode })
                });
                MODE = mode;
                modePill.textContent = mode.charAt(0).toUpperCase() + mode.slice(1);
                modePill.className = `mode-pill ${mode}`;
                await refreshAll();
            } catch (error) {
                console.error('Failed to set mode:', error);
                showError('Failed to switch mode. Using simulated.');
            }
        }

        // ----- Export CSV -----
        async function exportCSV() {
            try {
                const blob = await api('export');
                if (blob instanceof Blob) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = `dashboard_export_${new Date().toISOString().slice(0,10)}.csv`;
                    a.click();
                    URL.revokeObjectURL(url);
                    showError('✅ Export successful!');
                }
            } catch (error) {
                console.error('Export failed:', error);
                showError('❌ Export failed. Please try again.');
            }
        }

        // ----- Event Listeners -----
        btnSim.addEventListener('click', () => setMode('simulated'));
        btnReal.addEventListener('click', () => setMode('real'));
        btnRefresh.addEventListener('click', refreshAll);
        btnPause.addEventListener('click', () => {
            paused = !paused;
            btnPause.textContent = paused ? '▶️ Resume' : '⏸️ Pause';
            if (!paused) refreshAll();
        });
        btnExport.addEventListener('click', exportCSV);

        filterInput.addEventListener('input', () => renderRates(lastSnapshot.rates));
        sortSelect.addEventListener('change', () => renderRates(lastSnapshot.rates));

        // ----- Initialize -----
        document.addEventListener('DOMContentLoaded', () => {
            initCharts();
            refreshAll();
            // Auto-refresh every 5 seconds
            setInterval(refreshAll, 5000);

            // Initial data for rates
            lastSnapshot.rates = lastRates;
            renderRates(lastRates);
        });

        console.log('📊 Pro Dashboard loaded successfully!');
        console.log('ℹ️  All data is simulated locally with realistic random walk.');
        console.log('🔄 Click "Real" mode to attempt live API calls (may fail without internet).');
        console.log('📥 Use "Export CSV" to download current data.');
    </script>
</body>
</html>
