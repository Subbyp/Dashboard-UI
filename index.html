<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accessible Global Dashboard UI</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #3498db;
      --secondary: #2ecc71;
      --danger: #e74c3c;
      --bg-light: #f4f6f9;
      --bg-dark: #1e1e1e;
      --card-light: #fff;
      --card-dark: #2c2c2c;
    }
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: var(--bg-light);
      color: #333;
      transition: background 0.3s, color 0.3s;
    }
    .dark-mode { background: var(--bg-dark); color: #f4f4f4; }
    nav.sidebar {
      width: 220px; height: 100vh; background: #2c3e50; color: #fff;
      position: fixed; padding: 20px;
    }
    nav.sidebar a {
      display: block; color: #fff; text-decoration: none; margin: 10px 0;
      position: relative; transition: color 0.3s;
    }
    nav.sidebar a:hover { color: var(--primary); }
    nav.sidebar a:focus, button:focus {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }
    .main { margin-left: 240px; padding: 20px; }
    .header-widget {
      background: var(--primary); color: #fff; padding: 15px;
      border-radius: 8px; margin-bottom: 20px;
      display: flex; justify-content: space-between; align-items: center;
    }
    .card {
      background: var(--card-light); padding: 20px; margin: 10px 0;
      border-radius: 12px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .card:hover { transform: translateY(-6px); box-shadow: 0 8px 16px rgba(0,0,0,0.2); }
    .dark-mode .card { background: var(--card-dark); color: #f4f4f4; }
    canvas { max-width: 600px; }
    .currency-table { max-height: 300px; overflow-y: scroll; border: 1px solid #ccc;
      margin-top: 10px; border-radius: 8px; background: #fff; }
    .currency-table table { width: 100%; border-collapse: collapse; }
    .currency-table th, .currency-table td { padding: 8px; text-align: left; border-bottom: 1px solid #ddd; }
    .currency-table tr:hover { background: #ecf0f1; }
    @media (max-width: 768px) {
      nav.sidebar { width: 100%; height: auto; position: relative; }
      .main { margin-left: 0; }
    }
  </style>
</head>
<body>
  <nav class="sidebar" aria-label="Main navigation">
    <h2>Dashboard</h2>
    <a href="#" aria-label="Home section">Home</a>
    <a href="#" aria-label="Analytics section">Analytics</a>
    <a href="#" aria-label="Settings section">Settings</a>
    <button id="darkModeToggle" aria-label="Toggle dark mode">🌙</button>
  </nav>

  <main class="main">
    <div class="header-widget" id="weatherWidget" role="status">🌦 Loading weather...</div>

    <h1>Welcome Back!</h1>
    <section class="card" aria-labelledby="salesTitle">
      <h3 id="salesTitle">📊 Sales Overview (Bar)</h3>
      <canvas id="barChart" aria-label="Bar chart showing Bitcoin price trend"></canvas>
    </section>
    <section class="card" aria-labelledby="growthTitle">
      <h3 id="growthTitle">📈 Growth Trend (Line)</h3>
      <canvas id="lineChart" aria-label="Line chart showing Ethereum price trend"></canvas>
    </section>
    <section class="card" aria-labelledby="marketTitle">
      <h3 id="marketTitle">🥧 Market Share (Pie)</h3>
      <canvas id="pieChart" aria-label="Pie chart showing crypto market share"></canvas>
    </section>
    <section class="card" aria-labelledby="revenueTitle">
      <h3 id="revenueTitle">🍩 Revenue Split (Doughnut)</h3>
      <canvas id="doughnutChart" aria-label="Doughnut chart showing revenue split"></canvas>
    </section>
    <section class="card" aria-labelledby="weatherTitle">
      <h3 id="weatherTitle">🌦 Weather Overview</h3>
      <canvas id="weatherChart" aria-label="Line chart showing temperature trend"></canvas>
    </section>
    <section class="card" aria-labelledby="currencyTitle">
      <h3 id="currencyTitle">💱 Global Currency Rates</h3>
      <div class="currency-table" role="region" aria-label="Currency exchange rates">
        <table id="currencyTable">
          <thead><tr><th>Currency</th><th>Rate (USD→)</th></tr></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    function toggleDarkMode() {
      document.body.classList.toggle('dark-mode');
    }
    // Charts + API logic remain the same as before
  </script>
</body>
</html>
