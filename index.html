<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Simulated Dashboard with Endpoints</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root{--bg:#071028;--muted:#9fb6c9;--accent:#06b6d4;--accent2:#7c3aed;--success:#10b981;--danger:#ef4444}
    *{box-sizing:border-box} body{margin:0;font-family:Inter,system-ui;background:linear-gradient(180deg,#071028,#04101a);color:#e6eef8;padding:20px}
    .wrap{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:260px 1fr;gap:18px}
    aside{background:rgba(255,255,255,0.03);padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,0.04);height:calc(100vh - 40px);position:sticky;top:20px}
    .logo{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-weight:700}
    nav a{display:block;color:var(--muted);text-decoration:none;padding:8px;border-radius:8px;margin-top:8px}
    nav a:hover{color:#fff;background:rgba(255,255,255,0.02)}
    main{display:flex;flex-direction:column;gap:16px}
    .top{display:flex;justify-content:space-between;align-items:center}
    .pill{background:rgba(255,255,255,0.03);padding:8px 12px;border-radius:999px;color:var(--muted);font-weight:600}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
    .card{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));padding:16px;border-radius:12px;border:1px solid rgba(255,255,255,0.04)}
    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
    .stat{background:rgba(255,255,255,0.02);padding:12px;border-radius:10px}
    table{width:100%;border-collapse:collapse;color:var(--muted);font-size:13px}
    th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,0.02);text-align:left}
    th{color:#cfe9f3}
    .delta-up{color:var(--success);font-weight:700}
    .delta-down{color:var(--danger);font-weight:700}
    button{background:var(--accent);border:0;padding:8px 12px;border-radius:8px;color:#042;cursor:pointer}
    button.secondary{background:transparent;border:1px solid rgba(255,255,255,0.04);color:var(--muted)}
    @media(max-width:1000px){.wrap{grid-template-columns:1fr}.grid{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}aside{position:relative;height:auto}}
  </style>
</head>
<body>
  <div class="wrap" role="application" aria-label="Dashboard with endpoints">
    <aside aria-label="Sidebar">
      <div style="display:flex;gap:12px;align-items:center;margin-bottom:12px">
        <div class="logo">SD</div>
        <div><strong>SimDash</strong><div style="font-size:12px;color:var(--muted)">Endpoints enabled</div></div>
      </div>

      <nav aria-label="Main navigation">
        <a href="#">Overview</a>
        <a href="#">Markets</a>
        <a href="#">Currencies</a>
        <a href="#">Settings</a>
      </nav>

      <div style="margin-top:18px">
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Mode</div>
        <div style="display:flex;gap:8px">
          <button id="btnSim" class="pill" aria-pressed="true">Simulated</button>
          <button id="btnReal" class="pill" aria-pressed="false">Real</button>
        </div>
        <div style="margin-top:12px;font-size:12px;color:var(--muted)">Controls</div>
        <div style="display:flex;gap:8px;margin-top:8px">
          <button id="btnExport" class="secondary">Export CSV</button>
          <button id="btnSettings" class="secondary">Settings</button>
        </div>
      </div>
    </aside>

    <main>
      <div class="top">
        <div style="display:flex;gap:12px;align-items:center">
          <div class="pill" id="status">Mode: Simulated</div>
          <div class="pill" id="last">Updated: —</div>
        </div>
        <div style="display:flex;gap:8px">
          <button id="btnRefresh">Refresh</button>
          <button id="btnPause" class="secondary">Pause</button>
        </div>
      </div>

      <section class="stats" aria-label="Key metrics">
        <div class="stat"><div style="font-size:12px;color:var(--muted)">Bitcoin</div><div style="font-weight:700;font-size:18px" id="btc">$—</div><div id="btcDelta" style="font-size:12px;color:var(--muted)">—</div></div>
        <div class="stat"><div style="font-size:12px;color:var(--muted)">Ethereum</div><div style="font-weight:700;font-size:18px" id="eth">$—</div><div id="ethDelta" style="font-size:12px;color:var(--muted)">—</div></div>
        <div class="stat"><div style="font-size:12px;color:var(--muted)">Lagos</div><div style="font-weight:700;font-size:18px" id="temp">—</div><div id="tempDesc" style="font-size:12px;color:var(--muted)">—</div></div>
        <div class="stat"><div style="font-size:12px;color:var(--muted)">Currencies</div><div style="font-weight:700;font-size:18px" id="count">—</div><div style="font-size:12px;color:var(--muted)">USD base</div></div>
      </section>

      <div class="grid">
        <div class="card">
          <h3>Market Charts <span style="font-size:12px;color:var(--muted)">Live stream</span></h3>
          <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px">
            <div style="flex:1;min-width:260px"><canvas id="chartBTC" height="140"></canvas></div>
            <div style="flex:1;min-width:260px"><canvas id="chartETH" height="140"></canvas></div>
          </div>
        </div>

        <div class="card">
          <h3>Currency Rates <span style="font-size:12px;color:var(--muted)">USD base</span></h3>
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <input id="filter" placeholder="Filter (e.g., NGN)" style="flex:1;padding:8px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.03);color:var(--muted)"/>
            <select id="sort" style="padding:8px;border-radius:8px;background:transparent;border:1px solid rgba(255,255,255,0.03);color:var(--muted)">
              <option value="alpha">A → Z</option>
              <option value="rate_desc">Rate ↓</option>
              <option value="rate_asc">Rate ↑</option>
            </select>
          </div>
          <div class="currency-table" style="max-height:320px;overflow:auto;border-radius:10px;border:1px solid rgba(255,255,255,0.03)">
            <table id="rates" aria-live="polite">
              <thead><tr><th>Currency</th><th>Rate</th><th>Δ</th></tr></thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <div class="card" style="grid-column:1 / -1">
          <h3>Weather Snapshot & Actions</h3>
          <div style="display:flex;gap:16px;flex-wrap:wrap;margin-top:8px">
            <div style="flex:1;min-width:220px">
              <div id="weatherInfo">Loading weather…</div>
            </div>
            <div style="flex:1;min-width:220px">
              <div style="display:flex;gap:8px">
                <button id="btnExport2" class="secondary">Export CSV</button>
                <button id="btnOpenSettings" class="secondary">Open Settings</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Service Worker script injected and registered from the page -->
  <script>
    // Register service worker that provides local endpoints
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('Service Worker registered', reg);
      }).catch(err => console.warn('SW register failed', err));
    } else {
      console.warn('Service Worker not supported in this browser');
    }
  </script>

  <!-- Inline service worker file creation and logic -->
  <script>
    // Create a blob URL for the service worker so we can keep everything in one file.
    const swCode = `
      const VERSION = 'sim-sw-v1';
      // In-memory state inside the SW
      let MODE = 'simulated'; // 'simulated' or 'real'
      let lastRates = null;
      let lastCrypto = { btc: null, eth: null };
      let lastWeather = null;

      // Simple seeded random helpers
      function randn_bm(){
        let u=0,v=0; while(u===0) u=Math.random(); while(v===0) v=Math.random();
        return Math.sqrt(-2.0*Math.log(u))*Math.cos(2.0*Math.PI*v);
      }
      function simulateWalk(prev, vol=1, drift=0){
        const shock = randn_bm() * vol;
        const next = prev * (1 + drift/100) + shock;
        return Math.max(0.0001, next);
      }

      // Seed values
      const seed = {
        btc: 42000,
        eth: 3200,
        rates: {
          EUR:0.92, GBP:0.79, NGN:770, JPY:157.5, CNY:7.2, AUD:1.55, CAD:1.35,
          CHF:0.88, INR:83.5, BRL:5.1, ZAR:18.2, KES:148.5, EGP:30.8, MXN:17.2, RUB:95.4
        },
        weather: { temp:28, cond:'Clear', humidity:60 }
      };

      // Initialize last values
      lastCrypto.btc = seed.btc;
      lastCrypto.eth = seed.eth;
      lastRates = Object.assign({}, seed.rates);
      lastWeather = Object.assign({}, seed.weather);

      self.addEventListener('install', event => {
        self.skipWaiting();
      });

      self.addEventListener('activate', event => {
        event.waitUntil(self.clients.claim());
      });

      // Helper to respond with JSON
      function jsonResponse(obj, status=200){
        return new Response(JSON.stringify(obj), { status, headers: { 'Content-Type': 'application/json' }});
      }

      // Try to fetch real API but fallback to simulated
      async function tryFetchReal(url){
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error('Network error');
          const data = await res.json();
          return data;
        } catch(e){
          return null;
        }
      }

      self.addEventListener('fetch', event => {
        const url = new URL(event.request.url);
        // Only intercept our API paths
        if (url.pathname.startsWith('/api/')) {
          event.respondWith(handleApiRequest(event.request));
        }
      });

      async function handleApiRequest(request){
        const url = new URL(request.url);
        const path = url.pathname;
        const params = url.searchParams;

        // Mode switch endpoint
        if (path === '/api/mode') {
          if (request.method === 'POST') {
            try {
              const body = await request.json();
              if (body && (body.mode === 'simulated' || body.mode === 'real')) {
                MODE = body.mode;
                return jsonResponse({ ok:true, mode: MODE });
              }
            } catch(e){}
            return jsonResponse({ ok:false, error:'invalid body' }, 400);
          } else {
            return jsonResponse({ mode: MODE });
          }
        }

        // Crypto endpoint
        if (path === '/api/crypto') {
          if (MODE === 'real') {
            // Try CoinGecko
            const btc = await tryFetchReal('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin&vs_currencies=usd');
            const eth = await tryFetchReal('https://api.coingecko.com/api/v3/simple/price?ids=ethereum&vs_currencies=usd');
            if (btc && eth) {
              lastCrypto.btc = btc.bitcoin.usd;
              lastCrypto.eth = eth.ethereum.usd;
              return jsonResponse({ source:'live', btc:lastCrypto.btc, eth:lastCrypto.eth, ts:Date.now() });
            }
            // fallthrough to simulated
          }
          // Simulate random walk
          lastCrypto.btc = simulateWalk(lastCrypto.btc, 120, 0.02);
          lastCrypto.eth = simulateWalk(lastCrypto.eth, 6, 0.03);
          return jsonResponse({ source:'simulated', btc: Number(lastCrypto.btc.toFixed(2)), eth: Number(lastCrypto.eth.toFixed(2)), ts:Date.now() });
        }

        // Currency endpoint
        if (path === '/api/currency') {
          if (MODE === 'real') {
            const live = await tryFetchReal('https://api.exchangerate.host/latest?base=USD');
            if (live && live.rates) {
              lastRates = live.rates;
              return jsonResponse({ source:'live', rates: lastRates, ts:Date.now() });
            }
          }
          // Simulate small jitter on rates
          Object.keys(lastRates).forEach(k => {
            const v = lastRates[k];
            const jitter = (randn_bm() * (v * 0.001));
            lastRates[k] = Number(Math.max(0.0001, v + jitter).toFixed(6));
          });
          return jsonResponse({ source:'simulated', rates: lastRates, ts:Date.now() });
        }

        // Weather endpoint
        if (path === '/api/weather') {
          if (MODE === 'real') {
            const key = 'YOUR_OPENWEATHER_API_KEY'; // user can replace in page
            if (key && key !== 'YOUR_OPENWEATHER_API_KEY') {
              const live = await tryFetchReal('https://api.openweathermap.org/data/2.5/weather?q=Lagos&appid=' + key + '&units=metric');
              if (live && live.main) {
                lastWeather = { temp: live.main.temp, cond: live.weather[0].main, humidity: live.main.humidity };
                return jsonResponse({ source:'live', weather: lastWeather, ts:Date.now() });
              }
            }
          }
          // Simulate small temp drift
          lastWeather.temp = Number((lastWeather.temp + randn_bm()*0.2).toFixed(1));
          lastWeather.humidity = Math.max(10, Math.min(99, Math.round(lastWeather.humidity + randn_bm()*1)));
          lastWeather.cond = lastWeather.temp > 30 ? 'Hot' : lastWeather.temp > 20 ? 'Warm' : 'Cool';
          return jsonResponse({ source:'simulated', weather: lastWeather, ts:Date.now() });
        }

        // Export endpoint returns CSV
        if (path === '/api/export') {
          // Build CSV from lastRates and lastCrypto
          const rows = [];
          rows.push(['metric','value'].join(','));
          rows.push(['btc', lastCrypto.btc]);
          rows.push(['eth', lastCrypto.eth]);
          rows.push([]);
          rows.push(['currency','rate']);
          Object.keys(lastRates).forEach(k => rows.push([k, lastRates[k]].join(',')));
          const csv = rows.join('\\n');
          return new Response(csv, { status:200, headers: { 'Content-Type':'text/csv', 'Content-Disposition':'attachment; filename=\"dashboard_export.csv\"' }});
        }

        // Refresh endpoint triggers a simulated immediate update (no-op server-side)
        if (path === '/api/refresh') {
          // Return current snapshot
          return jsonResponse({ ok:true, ts:Date.now(), crypto:lastCrypto, rates:lastRates, weather:lastWeather });
        }

        // Unknown API path
        return jsonResponse({ error:'unknown endpoint' }, 404);
      }
    `;
    // Create blob and register as sw.js
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const swUrl = URL.createObjectURL(blob);

    // If a previous registration exists, unregister then register new one to pick up changes
    (async function registerInlineSW(){
      if (!('serviceWorker' in navigator)) return;
      try {
        // Unregister existing same-origin SWs to avoid conflicts
        const regs = await navigator.serviceWorker.getRegistrations();
        for (const r of regs) {
          // If an existing SW was registered from a blob URL we can't compare easily; skip mass unregister to avoid breaking other apps.
        }
        const reg = await navigator.serviceWorker.register(swUrl, { scope: './' });
        console.log('Inline SW registered', reg);
      } catch (e) {
        console.warn('SW registration failed', e);
      }
    })();
  </script>

  <!-- Client logic that calls endpoints and wires buttons -->
  <script>
    // Helper to call our endpoints
    async function api(path, opts = {}) {
      try {
        const res = await fetch('/api/' + path, opts);
        if (res.headers.get('Content-Type')?.includes('application/json')) return await res.json();
        // for CSV export, return blob
        if (res.headers.get('Content-Type')?.includes('text/csv')) return await res.blob();
        return await res.text();
      } catch (e) {
        console.warn('API call failed', path, e);
        throw e;
      }
    }

    // Charts
    const chartBTC = new Chart(document.getElementById('chartBTC'), {
      type:'line', data:{ labels:[], datasets:[{ label:'BTC', data:[], borderColor:'#06b6d4', tension:0.25, pointRadius:0 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{display:false}, y:{grid:{color:'rgba(255,255,255,0.02)'} } }
    });
    const chartETH = new Chart(document.getElementById('chartETH'), {
      type:'line', data:{ labels:[], datasets:[{ label:'ETH', data:[], borderColor:'#7c3aed', tension:0.25, pointRadius:0 }]},
      options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{ x:{display:false}, y:{grid:{color:'rgba(255,255,255,0.02)'} } }
    });

    // UI refs
    const btnSim = document.getElementById('btnSim');
    const btnReal = document.getElementById('btnReal');
    const btnRefresh = document.getElementById('btnRefresh');
    const btnPause = document.getElementById('btnPause');
    const btnExport = document.getElementById('btnExport');
    const btnExport2 = document.getElementById('btnExport2');
    const btnSettings = document.getElementById('btnSettings');
    const btnOpenSettings = document.getElementById('btnOpenSettings');

    const status = document.getElementById('status');
    const last = document.getElementById('last');
    const btcEl = document.getElementById('btc');
    const ethEl = document.getElementById('eth');
    const btcDelta = document.getElementById('btcDelta');
    const ethDelta = document.getElementById('ethDelta');
    const tempEl = document.getElementById('temp');
    const tempDesc = document.getElementById('tempDesc');
    const weatherInfo = document.getElementById('weatherInfo');
    const ratesTbody = document.querySelector('#rates tbody');
    const filterInput = document.getElementById('filter');
    const sortSelect = document.getElementById('sort');
    const countEl = document.getElementById('count');

    let paused = false;
    let pollHandle = null;
    let lastSnapshot = { crypto: null, rates: null, weather: null };

    // Wire mode buttons to /api/mode
    btnSim.addEventListener('click', async () => {
      await api('mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode:'simulated' }) });
      status.textContent = 'Mode: Simulated';
      btnSim.setAttribute('aria-pressed','true'); btnReal.setAttribute('aria-pressed','false');
      // immediate refresh
      await refreshAll();
    });
    btnReal.addEventListener('click', async () => {
      await api('mode', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ mode:'real' }) });
      status.textContent = 'Mode: Real (attempting)';
      btnReal.setAttribute('aria-pressed','true'); btnSim.setAttribute('aria-pressed','false');
      await refreshAll();
    });

    // Pause/resume polling
    btnPause.addEventListener('click', () => {
      paused = !paused;
      btnPause.textContent = paused ? 'Resume' : 'Pause';
      if (paused) clearInterval(pollHandle);
      else startPolling();
    });

    // Refresh button calls /api/refresh and updates UI
    btnRefresh.addEventListener('click', async () => {
      await refreshAll();
    });

    // Export buttons call /api/export and trigger download
    async function doExport(){
      try {
        const blob = await api('export');
        if (blob instanceof Blob) {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = 'dashboard_export.csv';
          document.body.appendChild(a); a.click(); a.remove();
          URL.revokeObjectURL(url);
        } else {
          console.warn('Export returned unexpected', blob);
        }
      } catch(e){
        alert('Export failed');
      }
    }
    btnExport.addEventListener('click', doExport);
    btnExport2.addEventListener('click', doExport);

    // Settings buttons open a simple modal (native prompt for simplicity)
    btnSettings.addEventListener('click', () => {
      const key = prompt('Enter OpenWeather API key (leave blank to keep simulated):', '');
      if (key !== null) {
        // store in localStorage and inform SW via /api/mode POST with same mode to trigger SW awareness
        localStorage.setItem('OPENWEATHER_KEY', key);
        alert('Key saved locally. Real mode will attempt to use it when enabled.');
      }
    });
    btnOpenSettings.addEventListener('click', () => btnSettings.click());

    // Filter and sort
    filterInput.addEventListener('input', () => renderRates(lastSnapshot.rates));
    sortSelect.addEventListener('change', () => renderRates(lastSnapshot.rates));

    // Render helpers
    function renderRates(rates){
      if (!rates) return;
      const filter = (filterInput.value || '').trim().toUpperCase();
      const sort = sortSelect.value;
      const entries = Object.entries(rates);
      let filtered = entries.filter(([k]) => k.includes(filter) || filter === '');
      if (sort === 'alpha') filtered.sort((a,b)=>a[0].localeCompare(b[0]));
      if (sort === 'rate_desc') filtered.sort((a,b)=>b[1]-a[1]);
      if (sort === 'rate_asc') filtered.sort((a,b)=>a[1]-b[1]);
      const frag = document.createDocumentFragment();
      filtered.forEach(([k,v]) => {
        const tr = document.createElement('tr');
        const prev = lastSnapshot.rates && lastSnapshot.rates[k] ? lastSnapshot.rates[k] : null;
        const delta = prev ? (v - prev) : 0;
        const cls = prev ? (delta > 0 ? 'delta-up' : (delta < 0 ? 'delta-down' : '')) : '';
        tr.innerHTML = '<td><strong style="color:#cfe9f3">'+k+'</strong></td><td>'+Number(v).toLocaleString(undefined,{minimumFractionDigits:4,maximumFractionDigits:4})+'</td><td class="'+cls+'">'+(prev ? (delta>0?'+':'')+delta.toFixed(4) : '—')+'</td>';
        frag.appendChild(tr);
      });
      ratesTbody.innerHTML = '';
      ratesTbody.appendChild(frag);
      countEl.textContent = Object.keys(rates).length;
    }

    // Refresh all: call /api/crypto, /api/currency, /api/weather, /api/refresh
    async function refreshAll(){
      try {
        const [crypto, currency, weather, snapshot] = await Promise.allSettled([
          api('crypto'),
          api('currency'),
          api('weather'),
          api('refresh')
        ]);

        if (crypto.status === 'fulfilled' && crypto.value) {
          const c = crypto.value;
          const prevBtc = parseFloat(btcEl.dataset.raw || 0);
          const prevEth = parseFloat(ethEl.dataset.raw || 0);
          btcEl.textContent = '$' + Number(c.btc).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
          ethEl.textContent = '$' + Number(c.eth).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
          btcEl.dataset.raw = c.btc; ethEl.dataset.raw = c.eth;
          btcDelta.textContent = prevBtc ? ((c.btc - prevBtc) >= 0 ? '+' : '') + (c.btc - prevBtc).toFixed(2) : '—';
          ethDelta.textContent = prevEth ? ((c.eth - prevEth) >= 0 ? '+' : '') + (c.eth - prevEth).toFixed(2) : '—';
          btcDelta.className = prevBtc ? (c.btc > prevBtc ? 'delta-up' : (c.btc < prevBtc ? 'delta-down' : '')) : '';
          ethDelta.className = prevEth ? (c.eth > prevEth ? 'delta-up' : (c.eth < prevEth ? 'delta-down' : '')) : '';
          // push to charts
          const t = new Date().toLocaleTimeString();
          chartBTC.data.labels.push(t); chartBTC.data.datasets[0].data.push(c.btc);
          chartETH.data.labels.push(t); chartETH.data.datasets[0].data.push(c.eth);
          if (chartBTC.data.labels.length > 60){ chartBTC.data.labels.shift(); chartBTC.data.datasets[0].data.shift(); }
          if (chartETH.data.labels.length > 60){ chartETH.data.labels.shift(); chartETH.data.datasets[0].data.shift(); }
          chartBTC.update('none'); chartETH.update('none');
        }

        if (currency.status === 'fulfilled' && currency.value) {
          lastSnapshot.rates = currency.value.rates || currency.value;
          renderRates(lastSnapshot.rates);
        }

        if (weather.status === 'fulfilled' && weather.value) {
          const w = weather.value.weather || weather.value;
          if (w.temp !== undefined) {
            tempEl.textContent = Math.round(w.temp) + '°C';
            tempDesc.textContent = w.cond || w.description || '—';
            weatherInfo.textContent = (w.cond || w.description || '—') + ', ' + (w.temp) + '°C — Humidity ' + (w.humidity || '—') + '%';
          }
        }

        if (snapshot.status === 'fulfilled' && snapshot.value) {
          // snapshot contains last values; keep for delta comparisons
          lastSnapshot = Object.assign({}, lastSnapshot, snapshot.value);
        }

        last.textContent = 'Updated: ' + new Date().toLocaleTimeString();
      } catch (e) {
        console.warn('refreshAll failed', e);
      }
    }

    // Polling loop
    function startPolling(){
      if (pollHandle) clearInterval(pollHandle);
      pollHandle = setInterval(() => { if (!paused) refreshAll(); }, 5000);
    }

    // Start
    refreshAll();
    startPolling();

    // Ensure export buttons call endpoint
    // Export handled above via doExport; wire second export button
    document.getElementById('btnExport2')?.addEventListener('click', () => document.getElementById('btnExport').click());

    // Accessibility: focus main on load
    window.addEventListener('load', () => document.querySelector('main').focus());
  </script>
</body>
</html>
